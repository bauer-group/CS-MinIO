# =============================================================================
# MinIO - Single Server Mode (Direct Port Access)
# =============================================================================
# Usage: docker compose -f docker-compose-single.yml up -d
#
# Features:
#   - Single MinIO server with direct port binding
#   - Admin console with full management UI
#   - Init container for declarative bucket/user setup
#   - IPv6 support
#
# Access:
#   - S3 API:  http://localhost:${EXPOSED_API_PORT}
#   - Console: http://localhost:${EXPOSED_CONSOLE_PORT}
# =============================================================================


### Service Templates ###
x-minio-common: &minio-common
  image: ${MINIO_IMAGE:-ghcr.io/bauer-group/cs-minio/minio}:${MINIO_VERSION:-latest}
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  command: server --address ":9000" --console-address ":9001" /data
  environment:
    - TZ=${TIME_ZONE:-Etc/UTC}
    - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
    - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    - MINIO_REGION_NAME=${MINIO_REGION:-eu-central-1}
    # Disable built-in browser (admin console provides full management UI)
    - MINIO_BROWSER=off
    # ── Prometheus Monitoring (optional) ────────────────────────────
    # Metrics endpoints: /minio/v2/metrics/cluster, /minio/v2/metrics/node
    # Uncomment to allow unauthenticated scraping (default: jwt):
    # - MINIO_PROMETHEUS_AUTH_TYPE=public
  expose:
    - 9000/tcp
    - 9001/tcp
  networks:
    local:


### Worker Template (optional) ###
x-worker-common: &worker-common
  profiles: [ "worker" ]
  image: ${WORKER_IMAGE:-ghcr.io/bauer-group/cs-minio/minio-worker}:${WORKER_VERSION:-latest}
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  environment:
    - TZ=${TIME_ZONE:-Etc/UTC}
    - WEBHOOK_AUTH_TOKEN=${WEBHOOK_AUTH_TOKEN:-}
    - PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL:-}
    # Cloudflare (auto-enabled when both are set) / Bunny (auto-enabled when set)
    - CF_API_TOKEN=${CF_PURGE_API_TOKEN:-}
    - CF_ZONE_ID=${CF_ZONE_ID:-}
    - BUNNY_API_KEY=${BUNNY_API_KEY:-}
    - QUEUE_DIR=/data/queue
    - LOG_LEVEL=${WORKER_LOG_LEVEL:-INFO}
    # Batching: coalesce URLs into fewer CDN calls (Cloudflare <=30/call; Bunny wildcard)
    - BATCH_WAIT_MS=${BATCH_WAIT_MS:-500}
    - BUNNY_WILDCARD_THRESHOLD=${BUNNY_WILDCARD_THRESHOLD:-0}
    # Broker: sqlite (in-container) now; set redis + REDIS_URL to scale out later
    - HUEY_BACKEND=${HUEY_BACKEND:-sqlite}
    - REDIS_URL=${REDIS_URL:-}
  volumes:
    - minio-worker-queue:/data/queue
  depends_on:
    minio-server:
      condition: service_healthy
  networks:
    local:


services:
### Application Services ###
  # MinIO S3 Server
  minio-server:
    <<: *minio-common
    container_name: ${STACK_NAME:-s3-app}_SERVER
    hostname: minio-server
    volumes:
      - minio-data:/data
    ports:
      - "${EXPOSED_API_PORT:-9000}:9000"


### Admin Console ###
  admin-console:
    image: ${CONSOLE_IMAGE:-ghcr.io/bauer-group/cs-minio/minio-console}:${CONSOLE_VERSION:-latest}
    container_name: ${STACK_NAME:-s3-app}_CONSOLE
    hostname: admin-console
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
      - CONSOLE_MINIO_SERVER=http://minio-server:9000
      - CONSOLE_MINIO_REGION=${MINIO_REGION:-eu-central-1}
    expose:
      - 9090/tcp
    ports:
      - "${EXPOSED_CONSOLE_PORT:-9001}:9090"
    depends_on:
      minio-server:
        condition: service_healthy
    networks:
      local:


### Initialization ###
  # MinIO Init Container (runs on every start, idempotent)
  minio-init:
    image: ${MINIO_INIT_IMAGE:-ghcr.io/bauer-group/cs-minio/minio-init}:${MINIO_INIT_VERSION:-latest}
    container_name: ${STACK_NAME:-s3-app}_INIT
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"
    environment:
      - TZ=${TIME_ZONE:-Etc/UTC}
      - MINIO_ENDPOINT=http://minio-server:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_WAIT_TIMEOUT=${MINIO_WAIT_TIMEOUT:-60}
      # Pass through environment variables used in config JSON files
      - CONSOLE_USER=${CONSOLE_USER:-console-admin}
      - CONSOLE_PASSWORD=${CONSOLE_PASSWORD:-console-admin}
      
      # Shared secret for the notifications task (minio-worker relay); empty if unused
      - WEBHOOK_AUTH_TOKEN=${WEBHOOK_AUTH_TOKEN:-}
    volumes:
      # Optional: mount custom initialization config (see config/minio-init.example.json)
      # - ${MINIO_INIT_CONFIG:-./config/minio-init.json}:/app/config/init.json:ro
      - minio-credentials:/data/credentials
    depends_on:
      minio-server:
        condition: service_healthy
    networks:
      local:


### Worker (optional - Compose profile: worker) ###
  # Generic webhook-driven worker = receiver (HTTP) + consumer (huey). Current job:
  # CDN cache purge (Cloudflare + Bunny). Enable with COMPOSE_PROFILES=worker (see .env.example).
  minio-worker:
    <<: *worker-common
    container_name: ${STACK_NAME:-s3-app}_WORKER
    hostname: minio-worker
    expose:
      - 8080/tcp
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Huey consumer: drains the queue and calls the CDN purge APIs.
  minio-worker-consumer:
    <<: *worker-common
    container_name: ${STACK_NAME:-s3-app}_WORKER_CONSUMER
    command: ["huey_consumer", "tasks.huey", "-w", "${WORKER_CONCURRENCY:-4}", "-k", "thread"]
    healthcheck:
      disable: true


### Volumes ###
volumes:
  minio-data:
    driver: local
    name: ${STACK_NAME:-s3-app}-data
  minio-credentials:
    driver: local
    name: ${STACK_NAME:-s3-app}-credentials
  minio-worker-queue:
    driver: local
    name: ${STACK_NAME:-s3-app}-worker-queue


### Networks ###
networks:
  local:
    driver: bridge
    name: ${STACK_NAME:-s3-app}
    enable_ipv6: true
